<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <style>
    /* General Styles */
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to bottom, #1e3c72, #2a5298);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 500px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    }

    h1 {
      font-size: 1.8rem;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group input,
    select {
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      outline: none;
      font-size: 1rem;
      margin-top: 5px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      background: #4caf50;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #3e8e41;
    }

    .weather-display {
      margin-top: 20px;
      text-align: center;
      padding: 15px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 12px;
      display: none;
      animation: fadeIn 1s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .weather-display h2 {
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .location-info {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .weather-info {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
    }

    .good {
      background: #27ae60;
    }

    .moderate {
      background: #f39c12;
    }

    .bad {
      background: #c0392b;
    }

    .weather-info p {
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .emoji {
      font-size: 1.5rem;
    }

    .back-button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #f44336;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    .back-button:hover {
      background: #d32f2f;
    }
    #loading {
  margin-top: 10px;
  font-size: 1rem;
  color: white;
}
  </style>
</head>

<body>
  <div class="container">
    <h1>Weather App</h1>
    <form id="loginForm" class="form-group">
      <input type="email" id="email" placeholder="Enter your email" required>
      <h1>hi!! Hello</h1>
      <button type="submit">Login</button>
    </form>

    <div id="weatherOptions" style="display: none;">
      <button onclick="getLocationWeather()">Fetch Weather by Location</button>
      <br><br>
      <select id="countrySelect">
        <option value="">Select Country</option>
      </select>
      <select id="stateSelect" style="display: none;" disabled>
        <option value="">Select State</option>
      </select>
      <select id="citySelect" style="display: none;" disabled>
        <option value="">Select City</option>
      </select>
      <button id="getCityWeather" style="display: none;" onclick="getCityWeather()">Get Weather</button>
    </div>

    <div id="weatherDisplay" class="weather-display">
      <div class="location-info">
        <h2>Weather in <span id="cityName"></span></h2>
        <p>Current Condition: <span id="weatherCondition"></span> <span id="conditionEmoji" class="emoji"></span></p>
        <button id="sendNotification" onclick="sendNotification()">Send Daily Notifications</button>
      </div>
      <div id="loading" style="display: none;">Sending notification...</div>
      <div id="temperature" class="weather-info">
        <p>Temperature: <span id="tempValue"></span> <span class="emoji">🌡</span></p>
      </div>
      <div id="feelsLike" class="weather-info">
        <p>Feels Like: <span id="feelsValue"></span> <span class="emoji">🥵</span></p>
      </div>
      <div id="humidity" class="weather-info">
        <p>Humidity: <span id="humidityValue"></span> <span class="emoji">💧</span></p>
      </div>
      <div id="airQuality" class="weather-info">
        <p>Air Quality: <span id="airQualityValue"></span> <span class="emoji">🌬</span></p>
      </div>
      <div id="uv" class="weather-info">
        <p>UV Index: <span id="uvValue"></span> <span class="emoji">☀</span></p>
      </div>
      <div id="visibility" class="weather-info">
        <p>Visibility: <span id="visibilityValue"></span> <span class="emoji">👁</span></p>
      </div>
      <button class="back-button" onclick="goBack()">Back</button>
    </div>
  </div>

  <script>
    const stateSelect = document.getElementById('stateSelect');
    const citySelect = document.getElementById('citySelect');
    const countrySelect = document.getElementById('countrySelect');

    // Function to get appropriate emoji for weather condition
    function getWeatherEmoji(condition) {
      condition = condition.toLowerCase();
      if (condition.includes('clear') || condition.includes('sunny')) return '☀';
      if (condition.includes('cloud')) return '☁';
      if (condition.includes('rain')) return '🌧';
      if (condition.includes('snow')) return '🌨';
      if (condition.includes('thunder')) return '⛈';
      if (condition.includes('fog') || condition.includes('mist')) return '🌫';
      return '🌤'; // default
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('weatherOptions').style.display = 'block';

      // Fetch list of countries dynamically
      await fetchCountries();
    });

    async function fetchCountries() {
      const response = await fetch('https://countriesnow.space/api/v0.1/countries/');
      const data = await response.json();
      countrySelect.innerHTML = `<option value="">Select Country</option>` +
        data.data.map(country => `<option value="${country.country}">${country.country}</option>`).join('');
    }

    countrySelect.addEventListener('change', async () => {
      const country = countrySelect.value;
      if (country) {
        await fetchStates(country);
        stateSelect.style.display = 'block';
      }
    });

    stateSelect.addEventListener('change', async () => {
      const country = countrySelect.value;
      const state = stateSelect.value;
      if (state) {
        await fetchCities(country, state);
        citySelect.style.display = 'block';
        document.getElementById('getCityWeather').style.display = 'block';
      }
    });

    async function fetchStates(country) {
      const response = await fetch('https://countriesnow.space/api/v0.1/countries/states', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ country }),
      });
      const data = await response.json();
      stateSelect.disabled = false;
      stateSelect.innerHTML = `<option value="">Select State</option>` +
        data.data.states.map(state => `<option value="${state.name}">${state.name}</option>`).join('');
    }

    async function fetchCities(country, state) {
      const response = await fetch('https://countriesnow.space/api/v0.1/countries/state/cities', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ country, state }),
      });
      const data = await response.json();
      citySelect.disabled = false;
      citySelect.innerHTML = `<option value="">Select City</option>` +
        data.data.map(city => `<option value="${city}">${city}</option>`).join('');
    }

    async function getCityWeather() {
      const city = citySelect.value;
      const apiKey = '46bbeed7d67446248a2150415242512';
      const response = await fetch(`https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${city}`);
      const data = await response.json();

      const weatherData = {
        cityName: data.location.name,
        condition: data.current.condition.text,
        temp: `${data.current.temp_c}°C`,
        feelsLike: `${data.current.feelslike_c}°C`,
        humidity: `${data.current.humidity}%`,
        airQuality: { value: 'Good', status: 'good' }, // Mock air quality
        uv: data.current.uv,
        visibility: `${data.current.vis_km} km`,
      };

      updateWeatherDisplay(weatherData);
    }

    async function getLocationWeather() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const apiKey = '46bbeed7d67446248a2150415242512';
          const response = await fetch(`https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${lat},${lon}`);
          const data = await response.json();

          const weatherData = {
            cityName: data.location.name,
            condition: data.current.condition.text,
            temp: `${data.current.temp_c}°C`,
            feelsLike: `${data.current.feelslike_c}°C`,
            humidity: `${data.current.humidity}%`,
            airQuality: { value: 'Good', status: 'good' }, // Mock air quality
            uv: data.current.uv,
            visibility: `${data.current.vis_km} km`,
          };

          updateWeatherDisplay(weatherData);
        });
      } else {
        alert("Geolocation is not supported by this browser.");
      }
    }

    async function sendNotification() {
  const email = document.getElementById('email').value;
  const city = document.getElementById('cityName').textContent;
  const condition = document.getElementById('weatherCondition').textContent;
  const temp = document.getElementById('tempValue').textContent;
  const humidity = document.getElementById('humidityValue').textContent;
  const uv = document.getElementById('uvValue').textContent;

  if (!email) {
    alert("Please enter your email first.");
    return;
  }

  // Show loading spinner
  document.getElementById('loading').style.display = 'block';

  try {
 const response = await fetch('https://xrcaxg3tch.execute-api.ap-south-1.amazonaws.com/dev/notifications', {
  method: 'POST',
  headers: { 
    'Content-Type': 'application/json',
    'Accept': 'application/json'
  },
  body: JSON.stringify({ email, city, condition, temp, humidity, uv }),
});

    const result = await response.json();

    if (result.success) {
      alert("You will receive daily weather notifications!");
    } else {
      alert("Failed to subscribe for notifications. Please try again.");
    }
  } catch (error) {
    alert("An error occurred. Please try again later.");
    console.error(error);
  } finally {
    // Hide loading spinner
    document.getElementById('loading').style.display = 'none';
  }
}
    function updateWeatherDisplay(data) {
      document.getElementById('cityName').textContent = data.cityName;
      document.getElementById('weatherCondition').textContent = data.condition;
      document.getElementById('conditionEmoji').textContent = getWeatherEmoji(data.condition);
      document.getElementById('tempValue').textContent = data.temp;
      document.getElementById('feelsValue').textContent = data.feelsLike;
      document.getElementById('humidityValue').textContent = data.humidity;
      const airQualityDiv = document.getElementById('airQuality');
      airQualityDiv.className = `weather-info ${data.airQuality.status}`;
      document.getElementById('airQualityValue').textContent = data.airQuality.value;
      document.getElementById('uvValue').textContent = data.uv;
      document.getElementById('visibilityValue').textContent = data.visibility;
      document.getElementById('weatherDisplay').style.display = 'block';
      document.getElementById('weatherOptions').style.display = 'none';
    }

    function goBack() {
      document.getElementById('weatherDisplay').style.display = 'none';
      document.getElementById('weatherOptions').style.display = 'block';
    }
  </script>
</body>
